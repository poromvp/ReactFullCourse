<!DOCTYPE html>
<html>

<head>
  <title>Chat Bot</title>
</head>

<body>
  <div class="js-container"></div>

  <script src="react-basics.js"></script>

  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel">
    function ChatInput() {
      return (
        <>
          <input
            placeholder="Send a merssage to ChatBot"
            size="30"
          />
          <button>Send</button>
        </>
      );
    }

    function ChatMessage({ message, sender }) {

      return (
        <div>
          {sender === 'robot' && (
            <img src="robot.png" width="50" />
          )}
          {message}
          {sender === 'user' && (
            <img src="user.png" width="50" />
          )}
        </div>
      );
    }

    function ChatMessages() {

      const chatMessage = [{
        message: 'Hello Chatbot',
        sender: 'user',
        id: 'id1'
      }, {
        message: 'Hello! How can I help you',
        sender: 'robot',
        id: 'id2'
      }, {
        message: 'Can you get me todays date?',
        sender: 'user',
        id: 'id3'
      }, {
        message: 'Today is July 11',
        sender: 'robot',
        id: 'id4'
      }, {
        message: 'How about flip a coin',
        sender: 'user',
        id: 'id5'
      }, {
        message: 'Sure! You got heads',
        sender: 'robot',
        id: 'id6'
      }];

      /*const chatMessageComponents = chatMessage.map((chatMessage) => {
        return (
          <ChatMessage
            message={chatMessage.message}
            sender={chatMessage.sender}
          />
        );
      });*/

      return (
        <>
          {
            chatMessage.map((chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })
          }
        </>
      );

    }


    function App() {




      return (
        <>
          <ChatInput />
        </>
      );
    }

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />);
  </script>
</body>

</html>
