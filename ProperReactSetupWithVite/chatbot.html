<!DOCTYPE html>
<html>

<head>
  <title>Chat Bot</title>
  <style>
    body {
      font-family: Arial;
      font-weight: bold;
      margin-top: 0px;
      margin-bottom: 0px ;
    }
    .send-button {
      background-color: rgb(56, 174, 224);
      color: white;
      padding: 12px 20px;
      margin-left: 10px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    .chat-input {
      padding: 12px 15px;
      border-radius: 10px;
      border-width: 2px;
      font-size: 15px;

      flex-grow: 1;
    }

    .chat-input-container {
      display: flex;
      margin-bottom: 60px;
    }

    .app-container {
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;

      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .chat-message-user {
      display: flex;
      justify-content: end;
      align-items: start;
    }

    .chat-message-robot {
      display: flex;
      align-items: start;
    }

    .chat-message-text {
      background-color: rgb(238, 238, 238);
      padding: 15px 20px;
      border-radius: 10px;
      margin-left: 10px;
      margin-right: 10px;
      margin-bottom: 10px;
      max-width: 300px;
    }

    .chat-message-profile{
      width: 45px;
    }

    .chat-messages-container{
      flex-grow: 1;
      margin-top: 20px;
      overflow: scroll;
      scrollbar-width: none;

    }

    .j {
      color: gray;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="js-container"></div>

  <script src="react-basics.js"></script>

  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

  <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel">
    function ChatInput({ chatMessage, setChatMessage }) {
      const [inputText, setInputText] = React.useState('');
      const [isLoading, setIsLoading] = React.useState(false);

      function saveInputText(event) {
        setInputText(event.target.value);
      }

      async function sendMessage() {
        if (isLoading || inputText === ''){
          return;
        }

        setIsLoading(true);

        const newChatMessages = [
          ...chatMessage,
          {
            message: inputText,
            sender: 'user',
            id: crypto.randomUUID()
          }
        ];
        setChatMessage(newChatMessages);
        setInputText('')
        
        setChatMessage([
          ...newChatMessages,
          {
            message: <img src="loading-spinner.gif" style={{height: '40px', margin: '-15px'}}/>,
            sender: 'robot',
            id: crypto.randomUUID()
          }
        ]);

        const response = await Chatbot.getResponseAsync(inputText);
        setChatMessage([
          ...newChatMessages,
          {
            message: response,
            sender: 'robot',
            id: crypto.randomUUID()
          }
        ]);

        setIsLoading(false);
      }

      function pressEnter(event) {
        if (event.key === 'Enter')
          sendMessage();
        if (event.key === 'Escape')
          setInputText('');
      }

      return (
        <div className="chat-input-container">
          <input
            placeholder="Send a merssage to ChatBot"
            size="30"
            onChange={saveInputText}
            value={inputText}
            onKeyDown={pressEnter}
            className="chat-input"
          />
          <button
            onClick={sendMessage}
            className="send-button"
          >Send</button>
        </div>
      );
    }

    function ChatMessage({ message, sender }) {

      return (
        <div className={
          sender === 'user'
            ? 'chat-message-user'
            : 'chat-message-robot'
        }>
          {sender === 'robot' && (
            <img src="robot.png" width="50" className="chat-message-profile"/>
          )}
          <div className="chat-message-text">
            {message}
          </div>
          {sender === 'user' && (
            <img src="user.png" width="50" className="chat-message-profile"/>
          )}
        </div>
      );
    }

    function ChatMessages({ chatMessage }) {
      const chatMessagesRef = React.useRef(null);
      
      React.useEffect(() => {
          const containerElem = chatMessagesRef.current;
          if (containerElem) {
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [chatMessage]);
      return (
        <div className="chat-messages-container"
        ref={chatMessagesRef}>
          {
            chatMessage.map((chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })
          }
        </div>
      );

    }


    function App() {
      const [chatMessage, setChatMessage] = React.useState([]);
      
      return (
        <div className="app-container">
          {chatMessage.length === 0 && <p className="j">Welcome to the chatbot project! Send a message using the textbox below.</p>}
          <ChatMessages
            chatMessage={chatMessage}
          />
          <ChatInput
            chatMessage={chatMessage}
            setChatMessage={setChatMessage}
          />
        </div>
      );
    }

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />);
  </script>
</body>

</html>
