<!DOCTYPE html>
<html>
  <head>
    <title>React Basics Exercises</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="react-basics.js"></script>

    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      //ex 1a 
      const div1a = (
        <div>
          <button>Good job!</button>
        </div>
      );
      
      //ex 1b
      const div1b = (
        <div>
          <p>My name is Poro</p>
        </div>
      );

      //ex 1c
      const div1c = (
        <div>
          <p>Cotton socks</p>
          <p>Price: $10</p>
          <button>Add to Cart</button>
        </div>
      );

      //ex 1d
      const productCost = 10 + 2*8;
      console.log(productCost);

      //ex 1e
      const productCostDisplay = <p>Product Cost: ${productCost}</p>;

      //ex 1f
      const shippingCost = 5;
      const totalCost = productCost + shippingCost;
      const div1f = (
        <div>
          <p>Product Cost: ${productCost}</p>
          <p>Shipping Cost: ${shippingCost}</p>
          <p>Total Cost: ${totalCost}</p>
          <button>Place your order</button>
        </div>
      );
    
      //ex 1g
      const today = dayjs().format('DD/MM/YYYY');
      console.log(today);

      //ex 1h
      const todayDisplay = <p>Today is {today}</p>;

      //ex 1i
      const now = dayjs().format('HH:mm:ss');
      const nowDisplay = <p>Current time is {now}</p>;

      //ex 1j
      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container); 
      const nowf = dayjs().format('HH:mm:ss');
      const nowDisplayf = <p>Current time is {nowf}</p>;

      root.render(nowDisplayf);
      setInterval(() => {
        const now = dayjs().format('HH:mm:ss');
        const nowDisplayf = <p>Current time is {now}</p>;
        root.render(nowDisplayf);
      }, 1000);
    </script>
  </body>
</html>
