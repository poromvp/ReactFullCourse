<!DOCTYPE html>
<html>

<head>
  <title>Lesson 4 - Exercise C</title>
  <style>
    .button-on {
      background-color: rgb(25, 135, 84);
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      font-size: 25px;
      color: white;
      cursor: pointer;
    }

    .button-off {
      background-color: rgb(220, 53, 69);
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      font-size: 25px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="js-container"></div>

  <script src="react-basics.js"></script>

  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

  <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel">
    function App() {
      const [isButtonOn, setIsButtonOn] = React.useState(true);
      function clickButton(){
        isButtonOn ? setIsButtonOn(false) : setIsButtonOn(true);
        
      }

      return (
        <>
          <button
            className={isButtonOn ? "button-on" : "button-off"}
            onClick={clickButton}
          >{isButtonOn ? "ON" : "OFF"}
          </button>
        </>
      );
    }
    const root = ReactDOM.createRoot(document.querySelector('.js-container')).render(<App />);
  </script>
</body>

</html>
