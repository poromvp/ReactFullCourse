<!DOCTYPE html>
<html>

<head>
    <title>Lession 4 - I</title>
    <style>
        button{
            background-color: rgb(25, 135, 84);
            color:white;
            border: none;
            padding: 10px;
            margin: 10px;
            cursor: pointer;
        }
        .counter-container{
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        function App() {
            const [count, setCount] = React.useState(0);
            const autoButtonRef = React.useRef();


            function clicked() {
                setCount(count + 1);
            }

            function resetCounter(){
              setCount(0);
            }

            function autoClick(){
              setInterval(()=>{
                const buttonElem = autoButtonRef.current;
                if(buttonElem){
                  buttonElem.click();
                }
              },1000);
            }
            return (
                <div className="counter-container">
                    {count === 1 ?
                        <button onClick={clicked} ref={autoButtonRef}>Clicked {count} time</button>
                        :
                        <button onClick={clicked} ref={autoButtonRef}>Clicked {count} times</button>
                    }
                    <button
                    onClick={resetCounter}>Reset</button>
                    <button
                    onClick={autoClick}>Auto Click</button>
                </div>

            );
        }

        const root = ReactDOM.createRoot(document.querySelector(".js-container")).render(<App />);

    </script>
</body>

</html>
