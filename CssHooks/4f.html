<!DOCTYPE html>
<html>

<head>
  <title>Lesson 4 - Exercise F</title>
  </style>
</head>

<body>
  <div class="js-container"></div>

  <script src="react-basics.js"></script>
  <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel">
    function App() {
      const [current, setCurrent] = React.useState(dayjs().format("HH:mm:ss"));
      React.useEffect(()=>{
        setInterval(() => {
          setCurrent(dayjs().format("HH:mm:ss"));
        }, 1000);
      });
      return (
        <p>
          Current time:  {current}
        </p>
      );
    }
    const root = ReactDOM.createRoot(document.querySelector('.js-container')).render(<App/>);
  </script>
</body>

</html>
