<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Trưng Bày</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #00d2ff;
            margin-bottom: 10px;
        }

        /* Vùng chứa bộ sưu tập ảnh */
        .gallery-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            padding: 20px 10px;
            overflow-x: auto; /* Bật thanh trượt ngang khi vượt quá chiều rộng */
            scroll-behavior: smooth;
        }

        /* Định dạng từng khung ảnh */
        .gallery-item {
            flex: 0 0 auto; /* Không cho phép ảnh bị co lại */
            width: 300px;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
            background-color: #1e1e1e;
        }

        .gallery-item:hover {
            transform: translateY(-10px); /* Hiệu ứng nổi lên khi di chuột */
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Đảm bảo ảnh lấp đầy khung mà không bị méo */
        }

        /* Tùy chỉnh làm đẹp thanh trượt (Scrollbar) cho Webkit (Chrome, Edge, Safari) */
        .gallery-container::-webkit-scrollbar {
            height: 12px;
        }

        .gallery-container::-webkit-scrollbar-track {
            background: #2a2a2a; 
            border-radius: 8px;
        }

        .gallery-container::-webkit-scrollbar-thumb {
            background: #00d2ff; 
            border-radius: 8px;
        }

        .gallery-container::-webkit-scrollbar-thumb:hover {
            background: #0099cc; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Bộ Sưu Tập Của Tôi</h1>
        <p>Cuộn ngang để xem chi tiết từng mẫu</p>
    </div>

    <!-- Khung chứa thanh trượt -->
    <div class="gallery-container">
        
        <!-- Ảnh 1 -->
        <div class="gallery-item">
            <img src="1.png" alt="Mẫu B1 Nguyên Bản">
        </div>

        <!-- Ảnh 2 -->
        <div class="gallery-item">
            <img src="2.png" alt="Mẫu B2 Trưng Bày">
        </div>

        <!-- Ảnh 3 -->
        <div class="gallery-item">
            <img src="3.png" alt="Bản Battle Damaged">
        </div>

        <!-- Ảnh 4 -->
        <div class="gallery-item">
            <img src="4.png" alt="Bản Custom Tự Sơn">
        </div>

        <!-- Ảnh 5 -->
        <div class="gallery-item">
            <img src="5.png" alt="Phần cứng độ thêm">
        </div>

        <!-- Bạn có thể copy thêm thẻ <div class="gallery-item">...</div> xuống dưới đây nếu có nhiều ảnh hơn -->

    </div>

</body>
</html>
