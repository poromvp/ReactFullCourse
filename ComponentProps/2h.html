<!DOCTYPE html>
<html>

<head>
    <title>Lession 2 - H</title>
</head>

<body>
    <div class="js-container"></div>

    <script src="react-basics.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        function ProductDetails({ productName, productPrice, productDiscount }) {
            return (
                <>
                    <p>{productName}</p>
                    {!productDiscount ?
                        (
                            <p>Price: ${productPrice}</p>
                        )
                        :
                        (
                            <>
                                <p><del>Price: ${productPrice}</del></p>
                                <p>Discount price: ${productDiscount}</p>
                            </>
                        )
                    }
                    <button>Add to Cart</button>
                </>
            );
        }

        function App() {
            return (
                <>
                    <ProductDetails
                        productName="Cotton socks"
                        productPrice="10.90"
                        productDiscount="5.45"
                    />

                    <ProductDetails
                        productName="Tennis balls"
                        productPrice="6.00"
                    />

                    <ProductDetails
                        productName="Plain T-Shirt"
                        productPrice="7.99"
                    />
                </>
            );
        }

        const container = document.querySelector('.js-container');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>

</html>
