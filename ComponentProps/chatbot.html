<!DOCTYPE html>
<html>
  <head>
    <title>Chat Bot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="react-basics.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput() {
        return (
          <>
            <input placeholder="Send a merssage to ChatBot" size="30"/>
            <button>Send</button>
          </>
        );
      }
      
      function ChatMessage(props) {
        console.log(props)
        const message = props.message;
        const source_icon = props.src;
        return(
          <div>
            {message}
            <img src={source_icon} width="50"/>
          </div>
        );
      }

      const app = (
        <>
          <ChatInput/>
          <ChatMessage message="Hello Chatbot" src="user.png"/>
          <ChatMessage message="Hello! How can I help you" src="robot.png"/>
          <ChatMessage message="Can you get me todays date?" src="user.png"/>
          <ChatMessage message="Today is July 11" src="robot.png"/>
          <ChatMessage message="How about flip a coin" src="user.png"/>
          <ChatMessage message="Sure! You got heads" src="robot.png"/>
        </>
      );

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(app);
    </script>
  </body>
</html>
